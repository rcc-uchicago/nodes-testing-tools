notes:
  - H100 has 4th generation Tensor Cores with FP8 support
  - SXM5 variant with NVLink-to-CPU provides 60-85 GB/s host-device bandwidth
  - PCIe variant limited to PCIe Gen4 bandwidth (~25 GB/s)
  - NVLink 4.0 provides 900 GB/s bidirectional per GPU (18 links)
  - HBM3 provides significantly higher memory bandwidth than A100's HBM2e
  - Performance assumes no thermal throttling and proper cooling
  - FP16 and BF16 performance should be nearly identical
  - Transformer Engine can leverage FP8 for even higher performance
