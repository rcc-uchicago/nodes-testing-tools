  multi_gpu:
    pcie_gen4:
      all_reduce_bandwidth_gbs:
        min: 10.0
        max: 15.0
        typical: 12.5
      p2p_bandwidth_gbs:
        min: 20.0
        max: 27.0
        typical: 24.0
    note: L40S does not have NVLink support

notes:
  - L40S is based on Ada Lovelace architecture (RTX 40 series)
  - Uses GDDR6 memory instead of HBM (lower bandwidth than A100/H100)
  - Very high FP32 performance relative to tensor performance
  - No NVLink support - PCIe Gen4 only for multi-GPU
  - 4th generation Tensor Cores similar to H100
  - Good for mixed precision training and inference
  - Strong for workloads requiring high FP32 compute
  - Memory bandwidth is lower than datacenter HBM GPUs
