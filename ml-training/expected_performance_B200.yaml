    host_to_device_pcie_gen5:
      min_bandwidth_gbs: 50.0
      max_bandwidth_gbs: 63.0
      typical_bandwidth_gbs: 57.0
    device_to_host_pcie_gen5:
      min_bandwidth_gbs: 50.0
      max_bandwidth_gbs: 63.0
      typical_bandwidth_gbs: 57.0
    host_to_device_sxm_nvlink:
      min_bandwidth_gbs: 100.0
      max_bandwidth_gbs: 140.0
