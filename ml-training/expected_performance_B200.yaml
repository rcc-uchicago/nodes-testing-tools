notes:
  - B200 is Blackwell architecture (announced 2024, available 2025)
  - 5th generation Tensor Cores with enhanced FP8 and FP4 support
  - Massive 192 GB HBM3e memory capacity
  - NVLink 5.0 provides 1.8 TB/s bidirectional bandwidth per GPU
  - HBM3e provides 8 TB/s memory bandwidth
  - Designed for large-scale AI training and inference
  - 2-3x performance improvement over H100
  - Performance numbers are estimates based on NVIDIA specifications
  - Actual performance may vary based on final production silicon
  - Optimized for transformer workloads and large language models
