notes:
  - A100 has 3rd generation Tensor Cores with strong FP16/BF16 performance
  - SXM variant with NVLink-to-CPU provides 40-55 GB/s host-device bandwidth
  - PCIe variant limited to PCIe Gen4 bandwidth (~25 GB/s)
  - NVLink 3.0 provides 600 GB/s bidirectional per GPU (12 links)
  - Performance assumes no thermal throttling and proper cooling
  - FP16 and BF16 performance should be nearly identical with Tensor Cores
